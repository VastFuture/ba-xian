name: Update movie data and deploy

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-site-main
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Search and update movie data
        run: npm run update-data
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Validate data and static export
        run: |
          node -e "JSON.parse(require('node:fs').readFileSync('data/movie.json', 'utf8'))"
          npm run typecheck
          npm run lint
          npm run build

      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/movie.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit \
            -m "Keep the 八仙 release page current" \
            -m "Refresh verified public film news while preserving values that had no newer evidence." \
            -m "Constraint: Scheduled public-web data refresh" \
            -m "Confidence: medium" \
            -m "Scope-risk: narrow" \
            -m "Tested: JSON parse; typecheck; lint; static build"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy static export to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN"
          DEPLOYMENT_URL=$(npx --yes vercel@54.18.7 deploy out \
            --prod \
            --yes \
            --project ba-xian-static \
            --meta githubCommitSha="$(git rev-parse HEAD)" \
            --token "$VERCEL_TOKEN" \
            -A vercel.json)
          echo "Production deployment: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
